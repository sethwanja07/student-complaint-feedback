<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f6f8;
}


header {
    background: #132849;
    padding: 15px;
}

nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

nav a {
    color: white;
    margin: 0 10px;
    text-decoration: none;
    font-weight: bold;
}

.container {
    width: 60%;
    margin: 30px auto;
    background: white;
    padding: 30px;
    border-radius: 10px;
}

h1 {
    text-align: center;
}

.subtitle {
    text-align: center;
    color: #555;
    margin-bottom: 20px;
}


.info-box {
    background: #f1f3f6;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
}

label {
    display: block;
    margin-top: 10px;
    font-weight: bold;
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 5px;
    border: 1px solid #ccc;
}


button {
    margin-top: 20px;
    background: #2c5aa0;
    color: white;
    padding: 12px;
    border: none;
    width: 200px;
    border-radius: 6px;
    display: block;
    margin-left: auto;
    margin-right: auto;
    font-size: 16px;
}
buttonL:hover{
    background: #0d47a1;
    transform: translateY(-2px);
}
nav a:hover{
    color: #ffcc00;
}

footer {
    background: #2f2f2f;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 30px;
}

.social {
    text-align: right;
    margin-top: 10px;
}

.social span {
    margin-left: 10px;
    font-size: 20px;
}
</style>
</head>

<body>

<header>
    <nav>
       <nav>
    <a href="index.html">Home</a>
    <a href="complaint.html">Submit Complaint</a>
    <a href="about.html">About</a>
    <a href="contact.html">Contact</a>
</nav>
    </nav>
</header>

<div class="container">

    <h1>Contact Us</h1>
    <p class="subtitle">Get in touch with the administration team</p>

    <div class="info-box">
        <p>📧 contact@school.edu</p>
        <p>📞 +250 78O 000 000</p>
    </div>

    <form>
        <label>Your Name</label>
        <input type="text" required>

        <label>Your Email Address</label>
        <textarea rows="4" required></textarea>

        <button type="submit">Send Message</button>
    </form>

    

</div>

<footer>
    © 2026 Student Complaint System. All rights reserved.
</footer>

</body>
</html>
